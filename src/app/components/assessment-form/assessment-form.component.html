<div class="min-h-screen bg-gradient-to-r from-purple-500 to-indigo-600 flex items-center justify-center">
  <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-3xl w-full">
    <h1 class="text-gray-800 font-bold text-3xl text-center mb-6">{{ subjectName }}</h1>
    <form [formGroup]="assessmentForm" (ngSubmit)="onSubmit()" class="space-y-6">
      
      <!-- Two-Column Layout for Question Type and Option Type -->
      <div class="grid grid-cols-2 gap-3">
        <div class="space-y-2">
          <label for="questionType" class="block text-gray-700 font-medium text-sm">Question Type:</label>
          <select
            formControlName="questionType"
            id="questionType"
            class="w-full border border-gray-300 rounded-lg p-3 text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500"
          >
            <option value="" disabled selected>Select Difficulty</option>
            <option *ngFor="let type of questionTypes" [value]="type">{{ type }}</option>
          </select>
        </div>
        
        <div class="space-y-2" *ngIf="assessmentForm.get('questionType')?.value !== 'descriptive'">
          <label for="optionType" class="block text-gray-700 font-medium text-sm">Option Type:</label>
          <select
            formControlName="optionType"
            id="optionType"
            class="w-full border border-gray-300 rounded-lg p-3 text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500"
          >
            <option value="" disabled selected>Select Option Type</option>
            <option *ngFor="let optionType of optionTypes" [value]="optionType">{{ optionType }}</option>
          </select>
        </div>
      </div>

      <!-- Question Text Section -->
      <div class="space-y-2">
        <label for="questionText" class="block text-gray-700 font-medium text-sm">Question Text:</label>
        <input
          formControlName="questionText"
          id="questionText"
          class="w-full border border-gray-300 rounded-lg p-3 text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500"
          placeholder="Enter your question"
          required
        />
      </div>

      <!-- Options Section -->
      <div *ngIf="assessmentForm.get('questionType')?.value !== 'descriptive'" class="space-y-2">
        <label class="block text-gray-700 font-medium text-sm">Add Options:</label>
        <div formArrayName="options" class="space-y-2">
          <div *ngFor="let option of options.controls; let i = index" class="flex items-center space-x-2">
            <input
              [formControlName]="i"
              class="w-full border border-gray-300 rounded-lg p-3 text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500"
              placeholder="Option {{ i + 1 }}"
              required
            />
            <button
              type="button"
              (click)="removeOption(i)"
              class="text-red-500 hover:text-red-700"
            >
              &#x2715;
            </button>
          </div>
        </div>
        <button
          type="button"
          (click)="addOption()"
          class="text-indigo-600 hover:text-indigo-800 text-sm font-medium"
        >
          + Add Option
        </button>
      </div>

      <!-- Correct Options and Timer in Two-Column Layout -->
      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-2" *ngIf="assessmentForm.get('questionType')?.value !== 'descriptive'">
          <label for="correctOptions" class="block text-gray-700 font-medium text-sm">Correct Options:</label>
          <input
            formControlName="correctOptions"
            id="correctOptions"
            class="w-full border border-gray-300 rounded-lg p-3 text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500"
            placeholder="e.g., 1,3"
            required
          />
        </div>

        <div class="space-y-2">
          <label for="maxMarks" class="block text-gray-700 font-medium text-sm">Max Marks:</label>
          <input
            type="number"
            formControlName="maxMarks"
            id="maxMarks"
            class="w-full border border-gray-300 rounded-lg p-3 text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500"
            placeholder="Enter max marks"
            required
          />
        </div>
      </div>

      <!-- Timer Field -->
      <div class="space-y-2">
        <label for="timer" class="block text-gray-700 font-medium text-sm">Timer (in seconds):</label>
        <input
          type="number"
          formControlName="timer"
          id="timer"
          class="w-full border border-gray-300 rounded-lg p-3 text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500"
          placeholder="Enter time in seconds"
          required
        />
      </div>

      <!-- Submit Button -->
      <div class="pt-4 text-center">
        <button
          type="submit"
          class="w-full py-3 bg-gradient-to-r from-indigo-500 to-purple-600 text-white text-sm font-semibold rounded-lg hover:from-purple-700 hover:to-indigo-700 transition duration-300"
          [disabled]="assessmentForm.invalid"
        >
          Submit
        </button>
      </div>
    </form>
  </div>
</div>
